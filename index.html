<html lang="en">

    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&icon_names=directions_walk,flag,meeting_room&display=block" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      /* Global Reset & Font */
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll */
        overscroll-behavior: none; /* Prevent pull-to-refresh on mobile */
        background-color: #f0fdf4;
      }

      /* Root container fixed to viewport to prevent collapse */
      #root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100dvh; /* Dynamic Viewport Height for mobile browsers */
        overflow: hidden;
      }

      body {
        font-family: "DM Sans", "Segoe UI", Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      
      /* Design System Variables */
      :root {
        --primary: 212 82% 51%;        /* #1a73e8 */
        --primary-foreground: 0 0% 98%;
        --background: 210 40% 98%;
        --foreground: 220 8% 14%;
        --card: 0 0% 100%;
        --muted: 220 18% 96%;
        --muted-foreground: 215 8% 43%;
        --accent: 210 100% 96%;
        --border: 214 11% 86%;
        --ring: 212 82% 51%;
        --radius: 1rem;
        --print-page-w: 210mm;
        --print-page-h: 297mm;
        --print-page-margin: 3mm;
        --print-content-w: calc(var(--print-page-w) - (var(--print-page-margin) * 2));
        --print-content-h: calc(var(--print-page-h) - (var(--print-page-margin) * 2));
        --print-header-h: 9.8mm;
        --print-map-top: calc(var(--print-header-h) + 2.2mm);
      }

      /* Custom Utilities */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Leaflet Customizations */
      .leaflet-container {
        background: #1a1a1a;
        font-family: inherit;
        width: 100%;
        height: 100%;
      }
      .leaflet-control-attribution {
        background: rgba(255, 255, 255, 0.7) !important;
        padding: 0 4px;
        border-radius: 4px 0 0 0;
      }

      /* --- ZOOM DEPENDENT MARKER STYLES --- */
      
      /* Default state: Hide everything, we show based on context */
      .gate-marker-container .gate-dot-view,
      .gate-marker-container .gate-icon-view {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      
      /* Low Zoom (< 16): Show Dot */
      .map-zoom-low .gate-marker-container .gate-dot-view {
        display: block;
      }
      /* But if force-show (selected), show icon anyway */
      .map-zoom-low .gate-marker-container .gate-icon-view.force-show {
        display: block !important;
      }
      .map-zoom-low .gate-marker-container .gate-dot-view:has(~ .gate-icon-view.force-show) {
        display: none !important;
      }

      /* High Zoom (>= 16): Show Icon */
      .map-zoom-high .gate-marker-container .gate-icon-view {
        display: block;
      }

      /* --- PRINT STYLES --- */
      @media print {
        @page {
          size: A4 portrait;
          margin: var(--print-page-margin);
        }

        html, body, #root {
          width: 100% !important;
          height: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
          background: #ffffff !important;
          overflow: hidden !important;
        }

        #root {
          position: relative !important;
          inset: auto !important;
        }

        .no-print,
        button,
        input,
        .leaflet-control-zoom,
        .leaflet-control-attribution,
        .bottom-sheet-ui,
        .search-ui,
        .nav-ui,
        .user-marker-ui,
        .compass-ui {
          display: none !important;
        }

        .print-only-header {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: var(--print-header-h);
          z-index: 9000;
          display: flex !important;
          align-items: center;
          justify-content: space-between;
          gap: 3mm;
          background: rgba(255, 255, 255, 0.97);
          border: 1px solid #d4d4d8;
          border-radius: 2.5mm;
          padding: 1.25mm 2.2mm;
          font-family: "DM Sans", "Segoe UI", Arial, sans-serif;
        }

        .print-header-main {
          display: flex;
          flex-direction: column;
          gap: 0.35mm;
          min-width: 0;
          flex: 1 1 auto;
        }

        .print-eyebrow {
          margin: 0;
          font-size: 6.5px;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          color: #71717a;
          font-weight: 700;
          line-height: 1;
        }

        .print-title {
          margin: 0;
          font-size: 10.8px;
          line-height: 1.08;
          color: #111111;
          font-weight: 800;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          max-width: 145mm;
        }

        .print-distance {
          margin: 0;
          font-size: 7.8px;
          color: #374151;
          font-weight: 600;
          line-height: 1.1;
        }

        .print-header-brand {
          display: flex;
          gap: 1.2mm;
          align-items: center;
          justify-content: flex-end;
          flex: 0 0 auto;
        }

        .print-brand-label {
          font-size: 6.4px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #6b7280;
          font-weight: 700;
          line-height: 1;
        }

        .print-logo-badge {
          width: 7.3mm;
          height: 7.3mm;
          border-radius: 50%;
          border: 1px solid #d4d4d8;
          background: #ffffff;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0.4mm;
        }

        .print-logo {
          width: 100%;
          height: 100%;
          object-fit: contain;
          display: block;
        }

        .leaflet-map-wrapper {
          position: absolute !important;
          top: var(--print-map-top) !important;
          left: 0 !important;
          width: 100% !important;
          height: calc(100% - var(--print-map-top)) !important;
          overflow: hidden !important;
          background: #ffffff !important;
          border-radius: 2.5mm;
          border: 1px solid #d1d5db;
        }

        .leaflet-map-canvas {
          position: absolute !important;
          inset: 0 !important;
          width: 100% !important;
          height: 100% !important;
          top: 0 !important;
          left: 0 !important;
          transform: none !important;
          transition: none !important;
        }

        .leaflet-container {
          background: #f9fafb !important;
          width: 100% !important;
          height: 100% !important;
        }

        .leaflet-tile-pane {
          filter: grayscale(100%) contrast(165%) brightness(88%) saturate(0%) !important;
          opacity: 1 !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .leaflet-tile-pane .leaflet-tile {
          filter: grayscale(100%) contrast(120%) brightness(96%) !important;
          opacity: 1 !important;
        }

        .leaflet-overlay-pane svg path:not(.nav-route-line):not(.nav-route-glow) {
          stroke: #2f2f2f !important;
          stroke-width: 1.45px !important;
          stroke-opacity: 0.72 !important;
          fill-opacity: 0 !important;
        }

        path.nav-route-glow {
          stroke: #ffffff !important;
          stroke-width: 3.6px !important;
          stroke-opacity: 1 !important;
          fill: none !important;
        }

        path.nav-route-line {
          stroke: #050505 !important;
          stroke-width: 1.45px !important;
          stroke-dasharray: 9, 4 !important;
          stroke-opacity: 1 !important;
          stroke-linecap: round !important;
          stroke-linejoin: round !important;
          fill: none !important;
          display: block !important;
        }

        html.print-color-mode .leaflet-tile-pane,
        body.print-color-mode .leaflet-tile-pane {
          filter: none !important;
          opacity: 1 !important;
        }

        html.print-color-mode .leaflet-tile-pane .leaflet-tile,
        body.print-color-mode .leaflet-tile-pane .leaflet-tile {
          filter: none !important;
          opacity: 1 !important;
        }

        .leaflet-marker-pane {
          display: block !important;
          z-index: 2200 !important;
        }

        .nav-start-marker, .nav-end-marker {
          opacity: 1 !important;
          filter: none !important;
        }

        .nav-start-marker div {
          background-color: #ffffff !important;
          border-color: #000000 !important;
          border-width: 3px !important;
        }

        .nav-start-marker svg path {
          fill: #000000 !important;
        }

        .animate-bounce-marker svg path {
          stroke: #000000 !important;
          stroke-width: 2px !important;
          fill: #ffffff !important;
        }

        .animate-bounce-marker svg circle:first-of-type {
          fill: #ffffff !important;
        }

        .animate-bounce-marker svg circle:last-of-type {
          fill: #000000 !important;
        }
      }

      html.preparing-print,
      body.preparing-print,
      body.preparing-print #root {
        width: 100% !important;
        height: 100% !important;
        background: #ffffff !important;
        overflow: hidden !important;
      }

      body.preparing-print {
        display: flex !important;
        align-items: flex-start !important;
        justify-content: center !important;
      }

      body.preparing-print #root {
        position: relative !important;
        width: var(--print-content-w) !important;
        height: var(--print-content-h) !important;
        min-height: var(--print-content-h) !important;
        max-height: var(--print-content-h) !important;
        inset: auto !important;
        margin: 0 auto !important;
      }

      body.preparing-print .no-print,
      body.preparing-print .compass-ui {
        display: none !important;
      }

      body.preparing-print .print-only-header {

      body.preparing-print .print-distance {

      body.preparing-print .leaflet-map-wrapper {

      body.preparing-print .leaflet-tile-pane .leaflet-tile {
        filter: grayscale(100%) contrast(120%) brightness(96%) !important;
        opacity: 1 !important;
      }

      body.preparing-print.print-color-mode .leaflet-tile-pane,
      html.print-color-mode body.preparing-print .leaflet-tile-pane {
        filter: none !important;
        opacity: 1 !important;
      }

      body.preparing-print.print-color-mode .leaflet-tile-pane .leaflet-tile,
      html.print-color-mode body.preparing-print .leaflet-tile-pane .leaflet-tile {
        filter: none !important;
        opacity: 1 !important;
      }

      body.preparing-print .leaflet-overlay-pane svg path:not(.nav-route-line):not(.nav-route-glow) {
        stroke: #2f2f2f !important;

      }

      body.preparing-print path.nav-route-glow {

      }

      body.preparing-print path.nav-route-line {

        display: block !important;
      }

      .print-only-header {
        display: none;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
